{% extends 'base.html' %}

{% block title %}Product Detail{% endblock %}

{% block content %}
<section class="card">
        <img class="product-image" src="{{ product.image }}" />
        <h2>{{ product.name }}</h2>
        <p class="price">{{ product.price }}</p>
        <p>{{ product.details }}</p>
        <a href="/products">{{ backLabel }}</a>
    </section>
{% endblock %}
